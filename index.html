  {area:"반곡관설동",name:"반곡관설동 사전투표소",place:"반곡관설동행정복지센터 (2층, 대회의실)",addr:"원주시 입춘로 5",fac:["승강기","점자유도블럭","장애인화장실"]},
];

const AREAS=["전체","문막읍","소초면","호저면","지정면","부론면","귀래면","흥업면","판부면","신림면","중앙동","원인동","개운동","명륜1동","명륜2동","단구동","일산동","학성동","단계동","우산동","태장1동","태장2동","봉산동","행구동","무실동","반곡관설동"];
let activeTab="전체";

function renderTabs(){
  document.getElementById('tabs').innerHTML=AREAS.map(a=>
    `<div class="tab${a===activeTab?' active':''}" onclick="setTab('${a}')">${a}</div>`
  ).join('');
  const el=document.querySelector('.tab.active');
  if(el) el.scrollIntoView({inline:'center',block:'nearest'});
}

function setTab(a){activeTab=a;renderTabs();render();}

function mapUrl(d){
  const q=encodeURIComponent("강원특별자치도 "+d.addr);
  return`https://map.naver.com/v5/search/${q}`;
}

const pinIcon=`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>`;
const mapIcon=`<svg viewBox="0 0 24 24"><polygon points="1,6 1,22 8,18 16,22 23,18 23,2 16,6 8,2"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>`;

function cardHtml(d){
  const tags=d.fac.length?d.fac.map(f=>`<span class="tag">${f}</span>`).join(''):`<span class="tag" style="opacity:.5">편의시설 정보 없음</span>`;
  return`<div class="card">
    <div class="card-name">${d.name}</div>
    <div class="card-place">${d.place}</div>
    <div class="card-addr">${pinIcon}<span>${d.addr}</span></div>
    <div class="card-footer">
      <div class="tags">${tags}</div>
      <a href="${mapUrl(d)}" class="map-btn" target="_blank" rel="noopener">${mapIcon}지도</a>
    </div>
  </div>`;
}

function render(){
  const q=(document.getElementById('searchInput').value||'').trim().toLowerCase();
  const filtered=DATA.filter(d=>{
    const tabOk=activeTab==="전체"||d.area===activeTab;
    const searchOk=!q||(d.area.includes(q)||d.name.includes(q)||d.place.includes(q)||d.addr.includes(q));
    return tabOk&&searchOk;
  });
  const el=document.getElementById('content');
  if(!filtered.length){
    el.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>검색 결과가 없습니다</div>`;
    return;
  }
  let html='';
  if(activeTab==="전체"&&!q){
    const groups={};
    filtered.forEach(d=>{(groups[d.area]=groups[d.area]||[]).push(d);});
    Object.keys(groups).forEach(area=>{
      html+=`<div class="section-label">${area}</div>`;
      groups[area].forEach(d=>html+=cardHtml(d));
    });
  } else {
    html+=`<div class="count-bar"><span class="count-text">검색된 투표소</span><span class="count-num">${filtered.length}개</span></div>`;
    filtered.forEach(d=>html+=cardHtml(d));
  }
  el.innerHTML=html;
}

renderTabs();
render();
</script>
</body>
</html>
